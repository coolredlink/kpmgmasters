<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masters Pool 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark: #1b4d2e;
    --green-mid: #2d6a4a;
    --green-accent: #3a7d56;
    --green-bg: #eef6f0;
    --green-soft: #d4eadb;
    --gold: #c8973a;
    --gold-light: #fdf3e0;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b7a6e;
    --border: #cde0d3;
    --under: #1b6b36;
    --over: #b83232;
    --even: #444;
    --cut: #aab4a0;
    --row-hover: #f5fbf7;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--green-bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--green-dark);
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 640px;
    margin: 0 auto;
    padding: 16px 0 12px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .logo-area { display: flex; align-items: center; gap: 10px; }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--gold);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .header-title {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.3px;
  }

  .header-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    margin-top: 1px;
  }

  .refresh-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.9);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    transition: background 0.15s;
  }

  .refresh-btn:hover { background: rgba(255,255,255,0.18); }
  .refresh-btn:active { transform: scale(0.97); }

  .status-bar {
    margin-top: 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4caf50;
    flex-shrink: 0;
  }
  .dot.loading { background: var(--gold); animation: pulse 1s infinite; }
  .dot.error { background: #ef5350; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* MAIN */
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* ROUND PILL */
  .round-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green-dark);
    color: rgba(255,255,255,0.9);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  .round-pill .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4caf50;
    animation: pulse 1.2s infinite;
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .legend span { display: flex; align-items: center; gap: 4px; }

  /* COLUMN HEADERS */
  .col-headers {
    display: grid;
    grid-template-columns: 36px 1fr 60px 28px;
    gap: 8px;
    padding: 0 14px 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* TEAM CARD */
  .team-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: box-shadow 0.15s, border-color 0.15s;
  }

  .team-card:hover { border-color: #a8c9b2; box-shadow: 0 2px 12px rgba(27,77,46,0.08); }

  .team-header {
    display: grid;
    grid-template-columns: 36px 1fr 60px 28px;
    align-items: center;
    gap: 8px;
    padding: 13px 14px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }

  .team-header:hover { background: var(--row-hover); }

  /* RANK */
  .rank {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    background: var(--green-soft);
    color: var(--green-dark);
  }

  .rank.r1 { background: var(--gold); color: white; }
  .rank.r2 { background: #b0b8b0; color: white; }
  .rank.r3 { background: #c07d3a; color: white; }

  /* TEAM INFO */
  .team-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .team-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  /* SCORE */
  .team-score {
    text-align: right;
  }

  .score-num {
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }

  .score-num.under { color: var(--under); }
  .score-num.over { color: var(--over); }
  .score-num.even { color: var(--even); }

  /* CHEVRON */
  .chevron {
    width: 18px; height: 18px;
    color: var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
    justify-self: end;
  }

  .chevron.open { transform: rotate(180deg); }

  /* DETAIL PANEL */
  .team-detail {
    display: none;
    background: #fafcfa;
    border-top: 1px solid var(--border);
    padding: 4px 14px 12px;
  }

  .team-detail.open { display: block; }

  .detail-golfer {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid #edf3ef;
  }

  .detail-golfer:last-of-type { border-bottom: none; }

  .g-name {
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .g-name.counting { font-weight: 600; }
  .g-name.dropped { color: var(--muted); }

  .g-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 5px;
    white-space: nowrap;
    font-weight: 500;
  }

  .g-badge.counts { background: #e6f4eb; color: #1b6b36; }
  .g-badge.drop { background: #f0f0f0; color: #999; }

  .g-score {
    font-size: 13px;
    font-weight: 700;
    min-width: 36px;
    text-align: right;
  }

  .g-score.under { color: var(--under); }
  .g-score.over { color: var(--over); }
  .g-score.even { color: var(--even); }
  .g-score.cut { color: var(--cut); font-weight: 400; font-style: italic; }

  .g-status {
    font-size: 11px;
    color: var(--muted);
    min-width: 48px;
    text-align: right;
  }

  .detail-note {
    font-size: 10px;
    color: var(--muted);
    margin-top: 10px;
    text-align: center;
    letter-spacing: 0.2px;
  }

  /* ERROR */
  .error-msg {
    background: #fff5f5;
    border: 1px solid #f5c6c6;
    border-radius: 10px;
    padding: 12px 16px;
    color: #a83232;
    font-size: 13px;
    margin-bottom: 14px;
    text-align: center;
  }

  /* FOOTER */
  footer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 8px 16px 24px;
    max-width: 640px;
    margin: 0 auto;
    line-height: 1.7;
  }

  .spin { display: inline-block; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div class="logo-area">
        <div class="logo-icon">⛳</div>
        <div>
          <div class="header-title">Masters Pool 2026</div>
          <div class="header-sub">Augusta National · Best 6 of 8</div>
        </div>
      </div>
      <button class="refresh-btn" onclick="loadScores()">
        <span id="refresh-icon">↻</span> Refresh
      </button>
    </div>
    <div class="status-bar">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">Loading scores...</span>
    </div>
  </div>
</header>

<main>
  <div id="round-banner" style="display:none"></div>
  <div id="error-box" class="error-msg" style="display:none"></div>

  <div class="legend">
    <span><strong style="color:var(--under)">−</strong> Under par</span>
    <span><strong style="color:var(--over)">+</strong> Over par</span>
    <span><strong style="color:var(--even)">E</strong> Even</span>
    <span style="color:var(--cut)"><em>CUT</em> Doesn't count</span>
    <span><span style="color:#1b6b36;font-weight:600">★</span> Counting</span>
  </div>

  <div class="col-headers">
    <div></div>
    <div>Team</div>
    <div style="text-align:right">Score</div>
    <div></div>
  </div>

  <div id="leaderboard"></div>
</main>

<footer>
  Scores via ESPN · Auto-refreshes every 3 minutes<br>
  CUT / WD golfers score as +99 and are dropped automatically
</footer>

<script>
// ============================================================
//  TEAM CONFIGURATION — EDIT THIS SECTION
// ============================================================
const TEAMS = [
  {
    name: "Felix",
    picks: ["Scottie Scheffler","Bryson DeChambeau","Xander Schauffele","Ludvig Aberg","Min Woo Lee","Akshay Bhatia","Nicolai Hojgaard","Corey Conners"]
  },
  {
    name: "Alain",
    picks: ["Scottie Scheffler","Rory McIlroy","Xander Schauffele","Ludvig Aberg","Justin Thomas","Patrick Cantlay","Harris English","Nicolai Hojgaard"]
  },
  {
    name: "Swats",
    picks: ["Scottie Scheffler","Rory McIlroy","Justin Rose","Ludvig Aberg","Sepp Straka","Min Woo Lee","Corey Conners","Sam Burns"]
  },
  {
    name: "Jo",
    picks: ["Scottie Scheffler","Bryson DeChambeau","Justin Rose","Ludvig Aberg","Justin Thomas","Shane Lowry","Nick Taylor","Corey Conners"]
  }
];

// ============================================================
//  APP LOGIC
// ============================================================
let liveScores = {};

function scoreClass(val) {
  if (val === null) return 'cut';
  if (val < 0) return 'under';
  if (val > 0) return 'over';
  return 'even';
}

function fmt(val) {
  if (val === null) return 'CUT';
  if (val === 0) return 'E';
  return val > 0 ? '+' + val : '' + val;
}

function norm(s) { return s.toLowerCase().replace(/[^a-z]/g, ''); }

function getScore(pick) {
  const p = norm(pick);
  for (const [name, data] of Object.entries(liveScores)) {
    const e = norm(name);
    if (p === e) return data;
    const parts = name.split(', ');
    if (parts.length === 2) {
      if (norm(parts[1] + parts[0]) === p) return data;
      if (norm(parts[0] + parts[1]) === p) return data;
    }
    if (e.length > 5 && p.length > 5 && (e.includes(p) || p.includes(e))) return data;
  }
  return null;
}

function calcTeam(picks) {
  const scores = picks.map(p => { const d = getScore(p); return d ? d.score : null; });
  const valid = scores.filter(s => s !== null).slice().sort((a, b) => a - b);
  const total = valid.slice(0, 6).reduce((a, b) => a + b, 0);
  return { scores, total };
}

function buildDetail(picks, scores) {
  const validSorted = scores.filter(s => s !== null).slice().sort((a, b) => a - b);
  const countingPool = [...validSorted.slice(0, 6)];
  const isCounting = scores.map(s => {
    if (s === null) return false;
    const i = countingPool.indexOf(s);
    if (i !== -1) { countingPool.splice(i, 1); return true; }
    return false;
  });

  return picks.map((name, i) => {
    const s = scores[i];
    const data = getScore(name);
    const counting = isCounting[i];
    const sc = scoreClass(s);
    const status = data?.status || '–';
    const badge = s === null
      ? `<span class="g-badge drop">cut/wd</span>`
      : counting
        ? `<span class="g-badge counts">★ counts</span>`
        : `<span class="g-badge drop">dropped</span>`;

    return `<div class="detail-golfer">
      <div class="g-name ${counting ? 'counting' : 'dropped'}">${name}</div>
      ${badge}
      <div class="g-score ${sc}">${fmt(s)}</div>
      <div class="g-status">${status}</div>
    </div>`;
  }).join('');
}

function renderLeaderboard() {
  const sorted = TEAMS.map((team, i) => {
    const { scores, total } = calcTeam(team.picks);
    return { team, scores, total };
  }).sort((a, b) => a.total - b.total);

  const lb = document.getElementById('leaderboard');
  lb.innerHTML = '';

  sorted.forEach(({ team, scores, total }, rank) => {
    const sc = scoreClass(total);
    const rankClass = rank === 0 ? 'r1' : rank === 1 ? 'r2' : rank === 2 ? 'r3' : '';
    const scoring = Math.min(scores.filter(s => s !== null).length, 6);

    const card = document.createElement('div');
    card.className = 'team-card';
    card.innerHTML = `
      <div class="team-header" onclick="toggle(this)">
        <div class="rank ${rankClass}">${rank + 1}</div>
        <div>
          <div class="team-name">${team.name}</div>
          <div class="team-sub">${scoring} golfer${scoring !== 1 ? 's' : ''} scoring</div>
        </div>
        <div class="team-score">
          <div class="score-num ${sc}">${fmt(total)}</div>
        </div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="team-detail">
        ${buildDetail(team.picks, scores)}
        <div class="detail-note">Best 6 of 8 picks count · Lowest scores selected automatically</div>
      </div>`;
    lb.appendChild(card);
  });
}

function toggle(header) {
  const detail = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  const wasOpen = detail.classList.contains('open');
  document.querySelectorAll('.team-detail.open').forEach(d => {
    d.classList.remove('open');
    d.previousElementSibling.querySelector('.chevron').classList.remove('open');
  });
  if (!wasOpen) { detail.classList.add('open'); chevron.classList.add('open'); }
}

function setStatus(type, msg) {
  document.getElementById('status-dot').className = 'dot ' + type;
  document.getElementById('status-text').textContent = msg;
}

async function loadScores() {
  setStatus('loading', 'Fetching live scores…');
  document.getElementById('error-box').style.display = 'none';
  try {
    const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard?event=401703510', { cache: 'no-store' });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const comp = data?.events?.[0]?.competitions?.[0];
    if (!comp) throw new Error('No data');

    const round = comp.status?.type?.description || '';
    const banner = document.getElementById('round-banner');
    if (round) {
      banner.style.display = 'inline-flex';
      banner.className = 'round-pill';
      banner.innerHTML = `<span class="live-dot"></span>${round}`;
    }

    liveScores = {};
    (comp.competitors || []).forEach(c => {
      const name = c.athlete?.displayName || '';
      const raw = c.score?.displayValue;
      let score = null;
      if (raw === 'E') score = 0;
      else if (raw && raw !== '--') { const n = parseInt(raw); if (!isNaN(n)) score = n; }
      liveScores[name] = { score, status: c.status?.type?.shortDetail || '' };
    });

    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    setStatus('', `Live · Updated ${now}`);
    renderLeaderboard();
  } catch (e) {
    setStatus('error', 'Could not load — tap Refresh to retry');
    const eb = document.getElementById('error-box');
    eb.style.display = 'block';
    eb.textContent = '⚠ Tournament scores unavailable. This is normal before Round 1 on Thursday April 9.';
    if (Object.keys(liveScores).length === 0) {
      TEAMS.forEach(t => t.picks.forEach(p => { if (!liveScores[p]) liveScores[p] = { score: null, status: '–' }; }));
    }
    renderLeaderboard();
  }
}

loadScores();
setInterval(loadScores, 180000);
</script>
</body>
</html>
